<footer class="footer">
  <div class="section-container">
    <div class="footer__grid">
      <!-- Brand -->
      <div class="footer__brand">
        <a href="#" class="footer__logo">
          <div class="footer__logo-icon">S</div>
          <span>SmartHire</span>
        </a>
        <p class="footer__tagline">AI-powered career platform for the next generation of engineers.</p>

        <!-- Newsletter -->
        <div class="footer__newsletter">
          <input type="email" placeholder="Enter your email" class="footer__input">
          <button class="btn-primary !py-2 !px-4 !text-sm">Subscribe</button>
        </div>
      </div>

      <!-- Links columns -->
      @for (col of columns; track col.title) {
        <div class="footer__col">
          <h4 class="footer__col-title">{{ col.title }}</h4>
          <ul class="footer__links">
            @for (link of col.links; track link) {
              <li><a href="#">{{ link }}</a></li>
            }
          </ul>
        </div>
      }
    </div>

    <div class="footer__bottom">
      <span class="footer__copyright">© 2026 SmartHire. All rights reserved.</span>
      <div class="footer__socials">
        @for (social of socials; track social.label) {
          <a [href]="social.href" class="footer__social" [attr.aria-label]="social.label">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              @switch (social.icon) {
                @case ('twitter') {
                  <path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/>
                }
                @case ('github') {
                  <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
                }
                @case ('linkedin') {
                  <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/>
                }
              }
            </svg>
          </a>
        }
      </div>
    </div>
  </div>
</footer>
